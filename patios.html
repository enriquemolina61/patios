<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Busca de Pátios e Terminais Ferroviários</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f6f6f7;
            color: #333;
        }
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .search-container {
            margin-bottom: 20px;
        }
        input[type="text"] {
            padding: 10px;
            border: 2px solid #1B3255;
            border-radius: 5px;
            width: 100%;
            box-sizing: border-box;
        }
        h1 {
            color: #1B3255;
        }
        p {
            color: #1B3255;
        }
        hr {
            margin: 10px 0;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.16.9/xlsx.full.min.js"></script>

    <script>
        let jsonData = [];

        function carregarDados() {
            const url = 'patios.xlsx';

            fetch(url)
                .then(response => response.arrayBuffer())
                .then(data => {
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    jsonData = XLSX.utils.sheet_to_json(sheet);

                    exibirPatios(jsonData);
                })
                .catch(error => {
                    console.error('Erro:', error);
                });
        }

        function exibirPatios(patios) {
            const div = document.getElementById('resultado');
            let html = '';

            patios.forEach(p => {
                html += `
                    <div>
                        <p><strong>Sigla do Pátio:</strong> ${p['Sigla Patio'] || 'Não tem'}</p>
                        <p><strong>Nome do Pátio:</strong> ${p.Patio || 'Não tem'}</p>
                        <p><strong>KM:</strong> ${p.KM || 'Não tem'}</p>
                        <p><strong>Região:</strong> ${p.Região || 'Não tem'}</p>
                        <p><strong>UF:</strong> ${p.UF || 'Não tem'}</p>
                        <p><strong>Município:</strong> ${p.Município || 'Não tem'}</p>
                        <p><strong>Sigla do Terminal:</strong> ${p['Sigla Terminal'] || 'Não tem'}</p>
                        <p><strong>Nome do Terminal:</strong> ${p.Terminal || 'Não tem'}</p>
                    </div>
                    <hr>
                `;
            });

            div.innerHTML = html;
        }

        function buscarPatio() {
            const termo = document.getElementById('siglaInput').value
                .toString()
                .toUpperCase()
                .trim();

            const filtrados = jsonData.filter(p => {

                const sigla = (p['Sigla Patio'] || '').toString().toUpperCase();
                const nome = (p.Patio || '').toString().toUpperCase();
                const km = (p.KM || '').toString().toUpperCase();

                return sigla.includes(termo) ||
                       nome.includes(termo) ||
                       km.includes(termo);
            });

            exibirPatios(filtrados);
        }

        document.addEventListener('DOMContentLoaded', () => {
            carregarDados();
            document.getElementById('siglaInput')
                .addEventListener('input', buscarPatio);
        });
    </script>
</head>

<body>

    <div class="logo">
        <img src="https://www.mrs.com.br/wp-content/uploads/2025/12/logo.png" alt="Logo">
    </div>

    <h1>Busca de Pátios e Terminais Ferroviários</h1>

    <div class="search-container">
        <input type="text" id="siglaInput"
               placeholder="Digite sigla, nome do pátio ou KM">
    </div>

    <div id="resultado"></div>

</body>
</html>
